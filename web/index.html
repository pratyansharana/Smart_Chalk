<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>SmartChalk</title>
  </head>
  <body>
    <div id="preloader-overlay" style="position:fixed;top:0;left:0;width:100%;height:100%;background-color:#020617;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,Cantarell,'Open Sans','Helvetica Neue',sans-serif;transition:opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1);opacity:1;">
      <style>
        @keyframes chalk-write {
          0% { width: 0; }
          50% { width: 140px; }
          100% { width: 140px; opacity: 0; }
        }
        @keyframes chalk-move {
          0% { transform: translate(0, 0) rotate(15deg); }
          50% { transform: translate(130px, -5px) rotate(25deg); }
          100% { transform: translate(130px, -5px) rotate(25deg); opacity: 0; }
        }
        @keyframes dust-float {
          0% { transform: translateY(0) scale(0.8); opacity: 0; }
          50% { opacity: 0.8; }
          100% { transform: translateY(15px) scale(0.4); opacity: 0; }
        }
        .chalk-line {
          height: 4px;
          background: linear-gradient(90deg, #fef08a, #fff);
          border-radius: 2px;
          box-shadow: 0 0 10px rgba(254,240,138,0.5);
          animation: chalk-write 2.5s infinite ease-in-out;
        }
        .chalk-piece {
          position: absolute;
          top: -24px;
          left: 0;
          width: 8px;
          height: 24px;
          background: #fff;
          border-radius: 2px;
          box-shadow: inset -2px -2px 5px rgba(0,0,0,0.2), 0 0 8px rgba(255,255,255,0.6);
          transform-origin: bottom left;
          animation: chalk-move 2.5s infinite ease-in-out;
        }
        .dust-particle {
          position: absolute;
          background: rgba(255,255,255,0.7);
          border-radius: 50%;
          width: 3px;
          height: 3px;
          animation: dust-float 1.5s infinite ease-out;
        }
        .preloader-hidden {
          opacity: 0 !important;
          pointer-events: none;
        }
      </style>
      <div style="position:relative;width:150px;height:40px;margin-bottom:24px;">
        <div class="chalk-line"></div>
        <div class="chalk-piece"></div>
        <!-- Chalk dust particles -->
        <div class="dust-particle" style="left:20px;bottom:30px;animation-delay:0.3s;"></div>
        <div class="dust-particle" style="left:60px;bottom:25px;animation-delay:0.8s;"></div>
        <div class="dust-particle" style="left:100px;bottom:28px;animation-delay:1.2s;"></div>
      </div>
      <h2 style="color:#ffffff;font-size:24px;font-weight:700;margin:0;letter-spacing:1px;font-family:'Space Grotesk',sans-serif;">Smart<span style="color:#f59e0b;">Chalk</span></h2>
      <p style="color:#94a3b8;font-size:12px;margin:8px 0 0 0;letter-spacing:2px;text-transform:uppercase;font-weight:600;">Drawing your classroom...</p>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      (function() {
        const startTime = Date.now();
        const minDuration = 2200; // Let the animation complete writing cycle (2.2 seconds)
        
        function hidePreloader() {
          const elapsed = Date.now() - startTime;
          const delay = Math.max(0, minDuration - elapsed);
          
          setTimeout(function() {
            const overlay = document.getElementById('preloader-overlay');
            if (overlay) {
              overlay.classList.add('preloader-hidden');
              setTimeout(function() {
                overlay.remove();
              }, 600); // Wait for opacity transition to finish
            }
          }, delay);
        }

        if (document.readyState === 'complete') {
          hidePreloader();
        } else {
          window.addEventListener('load', hidePreloader);
          // Fallback safety in case load event takes too long
          setTimeout(hidePreloader, 6000);
        }
      })();
    </script>
  </body>
</html>
